name: Deploy to cPanel via FTPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      contents: read
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER || vars.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME || vars.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD || vars.FTP_PASSWORD }}
      FTP_PORT: ${{ secrets.FTP_PORT || vars.FTP_PORT }}
      FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || vars.FTP_SERVER_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Debug environment
        run: |
          echo "Commit: $GITHUB_SHA"
          node --version
          npm --version

      - name: Validate deploy configuration
        run: |
          test -n "$FTP_SERVER" || (echo "Missing FTP_SERVER secret/variable" && exit 1)
          test -n "$FTP_USERNAME" || (echo "Missing FTP_USERNAME secret/variable" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "Missing FTP_PASSWORD secret/variable" && exit 1)
          test -n "$FTP_PORT" || (echo "Missing FTP_PORT secret/variable" && exit 1)
          test -n "$FTP_SERVER_DIR" || (echo "Missing FTP_SERVER_DIR secret/variable" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate static artifact exists
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "::error::dist/client/index.html not found."
            echo "::error::This repository currently builds server/client assets (TanStack Start), not a plain static SPA artifact for cPanel FTP hosting."
            echo "::error::Use Cloudflare deployment for this architecture, or switch to a static build output before using this workflow."
            exit 1
          fi

      - name: Include Apache rewrite rules (optional)
        run: |
          if [ -f public/.htaccess ]; then
            cp public/.htaccess dist/client/.htaccess
          else
            echo "No public/.htaccess found. Skipping copy."
          fi

      - name: Deploy client build to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftps
          local-dir: ./dist/client/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
